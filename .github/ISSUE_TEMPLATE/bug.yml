name: Bug
description: Signaler un bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que s'est-il passé ?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Étapes pour reproduire
      placeholder: |
        1. Aller sur /...
        2. Cliquer sur...
        3. Observer...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environnement
      placeholder: "macOS 14.5 / Chrome 122 / commit abc1234"
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
